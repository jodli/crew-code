name: CD

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            outfile: crew-linux-x64
          - target: bun-linux-arm64
            outfile: crew-linux-arm64
          - target: bun-darwin-x64
            outfile: crew-macos-x64
          - target: bun-darwin-arm64
            outfile: crew-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build ${{ matrix.target }}
        run: bun build --compile --minify --bytecode --target=${{ matrix.target }} src/main.ts --outfile ${{ matrix.outfile }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: ${{ matrix.outfile }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - run: chmod +x dist/crew-linux-x64 dist/crew-linux-arm64 dist/crew-macos-x64 dist/crew-macos-arm64
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
